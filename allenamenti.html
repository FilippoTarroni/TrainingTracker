<!DOCTYPE html>
<html lang="it">
    <head>
        <title>homepage</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <aside class="sidebar"> <!--aside serve per definire una parte della pagina secondaria, menu, sidebar ecc.-->
            <div class="logo"><h2>test app</h2></div>
            <nav class="menu"> <!--nav serve per definire i collegamenti di navigazione principali, quindi, i link alle altre pagine ecc.-->
                <ul>
                    <li><a href="index.html" >Homepage</a></li>
                    <li><a href="allenamenti.html" class="active">Allenamenti</a></li>
                    <li><a href="gare.html">Gare</a></li>
                    <li><a href="analisi.html">Analisi</a></li>
                    <li><a href="profilo.html" >Profilo</a></li><!--href serve per inserire un collegamento ipertestuale-->
                </ul>
            </nav>
        </aside>
        <main class="main-content">
            <header>
                <h2>Allenamenti</h2>
                <div class="header-row">
                    <button class="aggiungiAllenamento">+ Aggiungi Allenamento</button> 
                </div>
            </header>
            <section id="listaAllenamenti"></section>
            <div id="modalAttivita" class="modal">
            <div class="modal-content">
                <h3>Nuovo Allenamento</h3>
                    
                    <form id="formAttivita">
                        <input type="hidden" id="tipoAttivita" value="allenamento">
                        
                        <div class="form-group">
                            <label>Data</label>
                            <input type="date" id="dataAttivita">
                        </div>
                        
                        <div class="sezioneAllenamento" style="display:none">
                            <div class="form-group">
                                <label>Tipo di Allenamento</label>
                                <select id="tipoAllenamento">
                                    <option value="">Seleziona</option>
                                    <option value="lungo">Lungo</option>
                                    <option value="ripetute">Ripetute</option>
                                    <option value="medio">Medio</option>
                                    <option value="fartlek">Fartlek</option>
                                    <option value="progressivo">Progressivo</option>
                                    <option value="lento">Lento</option>
                                    <option value="Tempo">Tempo Run</option>
                                    <option value="recovery">Recovery Run</option>
                                </select>
                            </div>
                            
                            <div id="allenamentoSemplice" style="display: none">
                                <div class="form-group">
                                    <label>Distanza (km): </label>
                                    <input type="number" id="km" min="0.00000000001" step="any">
                                </div>
                                <div class="form-group">
                                    <label>Tempo: </label>
                                    <input type="text" id="tempoTotale" placeholder="es. 45:30">
                                </div>
                                <p style="margin: 10px 0; font-weight: 600; color: #4e73df;">
                                    Ritmo: <span id="ritmoCalcolato">-</span> /km
                                </p>
                            </div>
                            
                            <div id="allenamentoRipetute" style="display: none;">
                                <div class="form-group">
                                    <label>Descrizione complessiva: </label>
                                    <input type="text" id="descrizioneRipetute" placeholder="ex. 5x600">
                                </div>
                                
                                <label style="font-weight: 600; color: #5a5c69; font-size: 0.9rem;">Tempi singole ripetute:</label>
                                <div id="listaRipetute"></div>
                            </div>
                        </div>

                        <div id="sezioneGara" style="display:none">
                            <div class="form-group">
                                <label>Distanza: </label>
                                <input type="text" id="tipoGara" placeholder="es. 800m">
                            </div>
                            <div class="form-group">
                                <label>Luogo: </label>
                                <input type="text" id="luogoGara">
                            </div>
                            <div class="form-group">
                                <label>Tempo: </label>
                                <input type="text" id="tempoGara" placeholder="es. 2:02.25">
                            </div>
                        </div>
                        
                        <div class="form-group" style="margin-top: 15px;">
                            <label>Sensazioni</label>
                            <textarea id="sensazioni" rows="3" placeholder="Come è andata?"></textarea>
                        </div>
                        
                        <div class="modal-buttons">
                            <button type="button" id="annullaModal" style="background-color: #ffffff; border-color: #4e73df; color:#5a5c69">Annulla</button>
                            <button type="submit">Salva</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    <script src="js/storage.js"></script>
    <script src="js/utilis.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script src="js/script.js"></script>
    </body>
</html>
