<!DOCTYPE html>
<html lang="it">
    <head>
        <title>Profilo</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <aside class="sidebar"> <!--aside serve per definire una parte della pagina secondaria, menu, sidebar ecc.-->
            <div class="logo"><h2>test app</h2></div>
            <nav class="menu"> <!--nav serve per definire i collegamenti di navigazione principali, quindi, i link alle altre pagine ecc.-->
                <ul>
                    <li><a href="index.html">Homepage</a></li>
                    <li><a href="allenamenti.html">Allenamenti</a></li>
                    <li><a href="gare.html">Gare</a></li>
                    <li><a href="analisi.html">Analisi</a></li>
                    <li><a href="profilo.html" class="active">Profilo</a></li><!--href serve per inserire un collegamento ipertestuale-->
                </ul>
            </nav>
        </aside>
        <main class="main-content">
            <header><h2>Profilo Utente</h2></header>
            <form id="formUtente" class="card" style="margin-bottom: 20px;">
                <div class="card-header">Inserisci dati</div>
                <div class="card-body">
                    <p>
                        <label for="nome"><strong>Nome:</strong></label><br>
                        <input id="nome" type="text" required>
                    </p>
                    
                    <p>
                        <label for="cognome"><strong>Cognome:</strong></label><br>
                        <input id="cognome" type="text" required>
                    </p>
                    
                    <p>
                        <label for="eta"><strong>Età:</strong></label><br>
                        <input id="eta" type="number" min="0" required>
                    </p>
                    <button type="submit">Salva</button>
                </div>
            </form>
            <div class="card card-profilo">
                <div class="card-header">Informazioni Utente</div>
                <div class="card-body">
                    <p><strong>Nome: </strong><span id="outNome"> - </span></p>
                    <p><strong>Cognome: </strong><span id="outCognome"> - </span></p>
                    <p><strong>Età: </strong><span id="outEta"> - </span></p>
                </div>
            </div>
        </main>
        <script src="js/script.js"></script>
        <script src="js/storage.js"></script>
        <script src="js/utilis.js"></script>
    </body>
</html>
